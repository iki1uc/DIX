<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TIME 3×11 → 3×3</title>

<style>
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    width: 300px;
    margin: 20px auto;
  }
  .cell {
    border: 1px solid #444;
    padding: 12px;
    text-align: center;
    min-height: 40px;
    font-family: sans-serif;
  }
</style>
</head>

<body>

<div id="grid" class="grid"></div>

<script>
// ------------------------------------------------------
// TIME‑3×11 → 3×3 Schnitt
// ------------------------------------------------------
function sliceTime3x11to3x3(slots){
  return slots
    .filter(s => s.pos[1] <= 3)
    .map(s => ({
      pos: s.pos,
      ref: s.refs?.[0] || s.ref || "?",
      phase: s.phase || null
    }));
}

// ------------------------------------------------------
// Renderer
// ------------------------------------------------------
function render3x3(mask){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let r=1; r<=3; r++){
    for(let c=1; c<=3; c++){
      const cell = document.createElement("div");
      cell.className = "cell";

      const hit = mask.find(s => s.pos[0] === r && s.pos[1] === c);
      cell.textContent = hit ? hit.ref : "";
      grid.appendChild(cell);
    }
  }
}

// ------------------------------------------------------
// Beispiel: TIME‑3×11 present‑Zone
// ------------------------------------------------------
const timeExample = [
  { pos:[1,4], refs:["M-001"] },
  { pos:[2,5], refs:["M-017","M-023"], phase:[0.2,0.7] },
  { pos:[3,2], refs:["M-099"] }
];

// 3×3 erzeugen
const mask3x3 = sliceTime3x11to3x3(timeExample);

// Rendern
render3x3(mask3x3);
</script>

</body>
</html>
